# docker-compose.yml
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"   # UI + collector endpoint
      - "4317:4317"   # gRPC OTLP (optional)
    volumes:
      - ./data/phoenix:/mnt/data
    restart: unless-stopped